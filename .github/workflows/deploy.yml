name: Deploy to GitHub Pages

on:
  push:
    branches: [main] # Runs on every push to main
  workflow_dispatch: # Allow manual trigger from GitHub UI

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment runs at a time; cancel any queued run if a new one starts.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ── Build ──────────────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build
        env:
          # Injects the repo name as the basePath so assets resolve correctly
          # under https://suprabhat02.github.io/<repo-name>/
          # If you ever add a custom domain (CNAME), remove this env var.
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out # Next.js static export directory

  # ── Deploy ─────────────────────────────────────────────────────────────────
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
